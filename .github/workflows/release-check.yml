name: Release Check

on:
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:content
      - run: npm run validate:production
      - run: npm run build:web

