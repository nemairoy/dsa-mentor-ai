<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | DSA Mentor AI</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8fafc; color: #0f172a; }
      main { max-width: 420px; padding: 24px; border: 1px solid #cbd5e1; border-radius: 8px; background: white; }
      .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
      .logo { position: relative; display: grid; place-items: center; width: 48px; height: 48px; border-radius: 16px; background: linear-gradient(135deg, #14b8a6, #2563eb); box-shadow: 0 18px 45px rgba(13, 148, 136, 0.24); }
      .logo::before { content: ""; position: absolute; inset: 3px; border-radius: 14px; background: #020617; }
      .logo span { position: relative; color: white; font-size: 15px; font-weight: 900; }
      .logo span::after { content: ""; display: block; width: 28px; height: 4px; margin-top: 2px; border-radius: 999px; background: linear-gradient(90deg, #6ee7b7, #67e8f9); }
      .brand p { margin: 0; font-weight: 700; }
      .brand small { color: #64748b; }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="logo"><span>DSA</span></div>
        <div>
          <p>DSA Mentor AI</p>
          <small>Learn / Practice / Visualize / Improve</small>
        </div>
      </div>
      <h1>You are offline</h1>
      <p>DSA Mentor AI could not reach the network. Reconnect and refresh to continue.</p>
    </main>
  </body>
</html>
